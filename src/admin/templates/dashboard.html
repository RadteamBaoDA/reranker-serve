{% extends "base.html" %}
{% block body %}
<h2>Dashboard</h2>

<!-- Live KPI cards -->
<div hx-get="/admin/partials/stats" hx-trigger="load, every 2s" style="margin-bottom:1rem">
  <div class="kpi-grid"><div class="kpi"><div class="kpi-label">loading…</div></div></div>
</div>

<!-- Chart controls -->
<div class="controls">
  <span class="muted">Window</span>
  <div class="seg" id="window-seg">
    <button data-window="300">5m</button>
    <button data-window="900">15m</button>
    <button data-window="1800" class="active">30m</button>
    <button data-window="3600">60m</button>
  </div>
  <button class="toggle" id="pause-btn">⏸ Pause</button>
  <span class="muted" id="chart-status" style="font-size:.8rem"></span>
</div>

<!-- Trend charts -->
<div class="card">
  <h3>Performance Trends</h3>
  <div class="charts">
    <div class="chart-box" id="chart-latency"></div>
    <div class="chart-box" id="chart-throughput"></div>
    <div class="chart-box" id="chart-gpu"></div>
    <div class="chart-box" id="chart-queue"></div>
  </div>
</div>

<!-- Live queue tables -->
<div class="card">
  <h3>Queue &amp; Batching</h3>
  <div hx-get="/admin/partials/queue" hx-trigger="load, every 2s">Loading…</div>
</div>

<script src="/admin/static/dashboard.js"></script>
{% endblock %}
